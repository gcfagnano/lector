<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Lector</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14171C;
    --panel:#1E2229;
    --panel-alt:#262B33;
    --accent:#E8A33D;
    --accent-soft:rgba(232,163,61,0.14);
    --text:#ECE9E4;
    --text-muted:#8B92A0;
    --danger:#C4453D;
    --ring-track:#2E333C;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    display:flex;
    flex-direction:column;
    min-height:100vh;
    overflow-x:hidden;
  }
  header{
    padding:22px 20px 14px;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    border-bottom:1px solid rgba(255,255,255,0.06);
  }
  header .brand{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:20px;
    letter-spacing:0.06em;
    color:var(--text);
  }
  header .brand span{color:var(--accent);}
  header .count{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--text-muted);
  }
  main{
    flex:1;
    display:flex;
    flex-direction:column;
    padding:16px;
    gap:14px;
    max-width:520px;
    width:100%;
    margin:0 auto;
  }

  /* ---------- QUEUE VIEW ---------- */
  #queueView{display:flex; flex-direction:column; gap:14px;}
  .add-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    background:var(--accent);
    color:#1A1300;
    border:none;
    border-radius:14px;
    padding:16px;
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:15px;
    cursor:pointer;
  }
  .add-btn:active{transform:scale(0.98);}
  .empty-state{
    text-align:center;
    padding:60px 20px;
    color:var(--text-muted);
    font-size:14px;
    line-height:1.6;
  }
  .empty-state .glyph{
    font-family:'Space Grotesk',sans-serif;
    font-size:34px;
    color:var(--accent);
    margin-bottom:10px;
    display:block;
  }
  .doc-card{
    background:var(--panel);
    border-radius:16px;
    padding:16px 16px;
    display:flex;
    align-items:center;
    gap:14px;
    cursor:pointer;
    border:1px solid rgba(255,255,255,0.04);
  }
  .doc-card:active{background:var(--panel-alt);}
  .doc-icon{
    width:44px;height:44px;border-radius:12px;
    background:var(--accent-soft);
    display:flex;align-items:center;justify-content:center;
    font-family:'Space Grotesk',sans-serif;
    color:var(--accent);
    font-weight:700;
    font-size:15px;
    flex-shrink:0;
  }
  .doc-info{flex:1; min-width:0;}
  .doc-title{
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:15px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .doc-meta{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--text-muted);
    margin-top:4px;
  }
  .doc-del{
    color:var(--text-muted);
    font-size:20px;
    padding:6px 10px;
    background:none;
    border:none;
    cursor:pointer;
  }

  /* ---------- ADD PANEL ---------- */
  #addPanel{
    position:fixed; inset:0;
    background:var(--bg);
    z-index:50;
    display:none;
    flex-direction:column;
    padding:16px;
  }
  #addPanel.open{display:flex;}
  .panel-header{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:16px;
  }
  .panel-header h2{
    font-family:'Space Grotesk',sans-serif;
    font-size:18px; margin:0;
  }
  .close-btn{
    background:var(--panel);
    border:none; color:var(--text);
    width:36px;height:36px;border-radius:10px;
    font-size:18px; cursor:pointer;
  }
  .tabs{display:flex; gap:8px; margin-bottom:14px;}
  .tab{
    flex:1; text-align:center; padding:10px;
    border-radius:10px; background:var(--panel);
    color:var(--text-muted); font-size:13px; font-weight:600;
    cursor:pointer; border:1px solid transparent;
  }
  .tab.active{background:var(--accent-soft); color:var(--accent); border-color:var(--accent);}
  textarea{
    flex:1;
    background:var(--panel);
    border:1px solid rgba(255,255,255,0.06);
    border-radius:14px;
    color:var(--text);
    padding:14px;
    font-size:14px;
    font-family:'Inter',sans-serif;
    resize:none;
    min-height:200px;
  }
  input[type=text]{
    background:var(--panel);
    border:1px solid rgba(255,255,255,0.06);
    border-radius:12px;
    color:var(--text);
    padding:12px 14px;
    font-size:14px;
    font-family:'Inter',sans-serif;
    margin-bottom:10px;
  }
  .upload-zone{
    flex:1;
    border:2px dashed rgba(255,255,255,0.12);
    border-radius:16px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:10px; color:var(--text-muted); font-size:13px;
    cursor:pointer;
  }
  .upload-zone .glyph{font-size:30px; color:var(--accent);}
  .save-btn{
    margin-top:14px;
    background:var(--accent);
    color:#1A1300;
    border:none; border-radius:14px; padding:15px;
    font-family:'Space Grotesk',sans-serif;
    font-weight:700; font-size:15px; cursor:pointer;
  }
  .save-btn:disabled{opacity:0.4;}
  .status-line{
    font-family:'JetBrains Mono',monospace;
    font-size:12px; color:var(--text-muted); margin-top:8px; min-height:16px;
  }

  /* ---------- PLAYER VIEW ---------- */
  #playerView{display:none; flex-direction:column; align-items:center; gap:22px; padding-top:6px;}
  #playerView.open{display:flex;}
  .back-row{width:100%; display:flex; align-items:center; gap:10px;}
  .back-btn{
    background:var(--panel); border:none; color:var(--text);
    width:38px;height:38px;border-radius:10px; font-size:18px; cursor:pointer;
  }
  .player-title{
    font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:15px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1;
  }

  .dial-wrap{position:relative; width:220px; height:220px; margin-top:10px;}
  .dial-wrap svg{transform:rotate(-90deg); width:220px; height:220px;}
  .dial-track{fill:none; stroke:var(--ring-track); stroke-width:10;}
  .dial-progress{fill:none; stroke:var(--accent); stroke-width:10; stroke-linecap:round; transition:stroke-dashoffset 0.2s linear;}
  .dial-btn{
    position:absolute; inset:18px;
    border-radius:50%;
    background:var(--panel);
    border:1px solid rgba(255,255,255,0.06);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .dial-btn .icon{font-size:44px; color:var(--accent); font-family:'Space Grotesk',sans-serif;}
  .readout{
    font-family:'JetBrains Mono',monospace;
    font-size:13px; color:var(--text-muted); letter-spacing:0.04em;
  }

  .skip-row{display:flex; gap:20px; align-items:center;}
  .skip-btn{
    background:var(--panel); border:none; color:var(--text);
    width:52px; height:52px; border-radius:50%;
    font-size:20px; cursor:pointer;
  }
  .skip-btn:active{background:var(--panel-alt);}

  .rate-row{
    width:100%; display:flex; gap:8px; justify-content:center; flex-wrap:wrap;
  }
  .rate-chip{
    background:var(--panel); color:var(--text-muted);
    border:1px solid transparent; border-radius:20px;
    padding:8px 14px; font-family:'JetBrains Mono',monospace; font-size:12px;
    cursor:pointer;
  }
  .rate-chip.active{background:var(--accent-soft); color:var(--accent); border-color:var(--accent);}

  .voice-select{
    width:100%; background:var(--panel); color:var(--text);
    border:1px solid rgba(255,255,255,0.06); border-radius:12px;
    padding:12px 14px; font-family:'Inter',sans-serif; font-size:13px;
  }
</style>
</head>
<body>

<header>
  <div class="brand">LEC<span>TOR</span></div>
  <div class="count" id="headerCount">0 documentos</div>
</header>

<main>

  <!-- QUEUE -->
  <div id="queueView">
    <button class="add-btn" onclick="openAddPanel()">＋ Agregar documento</button>
    <div id="queueList"></div>
  </div>

  <!-- PLAYER -->
  <div id="playerView">
    <div class="back-row">
      <button class="back-btn" onclick="closePlayer()">←</button>
      <div class="player-title" id="playerTitle">—</div>
      <button class="doc-del" onclick="deleteCurrentDoc()">🗑</button>
    </div>

    <div class="dial-wrap">
      <svg viewBox="0 0 220 220">
        <circle class="dial-track" cx="110" cy="110" r="98"></circle>
        <circle class="dial-progress" id="dialProgress" cx="110" cy="110" r="98"
                stroke-dasharray="615.75" stroke-dashoffset="615.75"></circle>
      </svg>
      <button class="dial-btn" id="dialBtn" onclick="togglePlay()">
        <span class="icon" id="dialIcon">▶</span>
      </button>
    </div>

    <div class="readout" id="progressReadout">0 / 0</div>

    <div class="skip-row">
      <button class="skip-btn" onclick="skip(-1)">⟲</button>
      <button class="skip-btn" onclick="skip(-5)">«</button>
      <button class="skip-btn" onclick="skip(5)">»</button>
      <button class="skip-btn" onclick="skip(1)">⟳</button>
    </div>

    <div class="rate-row" id="rateRow"></div>

    <select class="voice-select" id="voiceSelect"></select>
  </div>

</main>

<!-- ADD PANEL -->
<div id="addPanel">
  <div class="panel-header">
    <h2>Nuevo documento</h2>
    <button class="close-btn" onclick="closeAddPanel()">✕</button>
  </div>
  <div class="tabs">
    <div class="tab active" id="tabPaste" onclick="switchTab('paste')">Pegar texto</div>
    <div class="tab" id="tabFile" onclick="switchTab('file')">Subir archivo</div>
  </div>

  <div id="pasteTab" style="display:flex; flex-direction:column; flex:1;">
    <input type="text" id="pasteTitle" placeholder="Título del documento" />
    <textarea id="pasteText" placeholder="Pegá el texto acá..."></textarea>
  </div>

  <div id="fileTab" style="display:none; flex-direction:column; flex:1;">
    <input type="text" id="fileTitle" placeholder="Título (opcional, usa el nombre del archivo)" />
    <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
      <div class="glyph">⇪</div>
      <div id="fileZoneLabel">Tocá para elegir un archivo (.txt, .pdf, .docx)</div>
    </div>
    <input type="file" id="fileInput" accept=".txt,.pdf,.docx" style="display:none" onchange="handleFile(event)" />
  </div>

  <div class="status-line" id="statusLine"></div>
  <button class="save-btn" id="saveBtn" onclick="saveDocument()">Guardar y agregar a la cola</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

// Polyfill de almacenamiento: usa localStorage del navegador cuando la app
// corre como sitio propio (Vercel, GitHub Pages, etc). Si en algún momento
// se abre dentro del entorno de artefactos de Claude, se usa el nativo.
if(!window.storage){
  window.storage = {
    async get(key, shared){
      const raw = localStorage.getItem(key);
      if(raw === null){ throw new Error('key not found: ' + key); }
      return {key, value: raw, shared: !!shared};
    },
    async set(key, value, shared){
      localStorage.setItem(key, value);
      return {key, value, shared: !!shared};
    },
    async delete(key, shared){
      localStorage.removeItem(key);
      return {key, deleted: true, shared: !!shared};
    },
    async list(prefix, shared){
      const keys = Object.keys(localStorage).filter(k => !prefix || k.startsWith(prefix));
      return {keys, prefix, shared: !!shared};
    }
  };
}

let documents = [];       // {id, title, createdAt, chunkCount}
let currentDoc = null;    // full doc object with .content
let chunks = [];
let currentIndex = 0;
let isPlaying = false;
let manualStop = false;
let currentRate = 1;
let selectedVoice = null;
let pendingFileText = "";
let activeTab = 'paste';

const RATES = [0.75, 1, 1.25, 1.5, 1.75, 2];

// ---------- INIT ----------
init();
async function init(){
  try{
    const res = await window.storage.get('documents-list', false);
    documents = res ? JSON.parse(res.value) : [];
  }catch(e){ documents = []; }
  renderQueue();
  buildRateRow();
  loadVoices();
  if(typeof speechSynthesis !== 'undefined'){
    speechSynthesis.onvoiceschanged = loadVoices;
  }
}

function renderQueue(){
  const list = document.getElementById('queueList');
  document.getElementById('headerCount').textContent =
    documents.length + (documents.length===1 ? ' documento' : ' documentos');
  if(documents.length === 0){
    list.innerHTML = `<div class="empty-state"><span class="glyph">◎</span>Todavía no cargaste nada.<br>Agregá un documento para empezar a escuchar.</div>`;
    return;
  }
  list.innerHTML = documents.slice().reverse().map(d => `
    <div class="doc-card" onclick="openDoc('${d.id}')">
      <div class="doc-icon">${(d.title||'D').slice(0,2).toUpperCase()}</div>
      <div class="doc-info">
        <div class="doc-title">${escapeHtml(d.title)}</div>
        <div class="doc-meta">${d.chunkCount} frases · ${d.progress||0}/${d.chunkCount} leídas</div>
      </div>
      <button class="doc-del" onclick="event.stopPropagation(); deleteDoc('${d.id}')">🗑</button>
    </div>
  `).join('');
}

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ---------- ADD PANEL ----------
function openAddPanel(){
  document.getElementById('addPanel').classList.add('open');
  document.getElementById('pasteTitle').value = '';
  document.getElementById('pasteText').value = '';
  document.getElementById('fileTitle').value = '';
  document.getElementById('fileZoneLabel').textContent = 'Tocá para elegir un archivo (.txt, .pdf, .docx)';
  document.getElementById('statusLine').textContent = '';
  pendingFileText = '';
  switchTab('paste');
}
function closeAddPanel(){
  document.getElementById('addPanel').classList.remove('open');
}
function switchTab(t){
  activeTab = t;
  document.getElementById('tabPaste').classList.toggle('active', t==='paste');
  document.getElementById('tabFile').classList.toggle('active', t==='file');
  document.getElementById('pasteTab').style.display = t==='paste' ? 'flex' : 'none';
  document.getElementById('fileTab').style.display = t==='file' ? 'flex' : 'none';
}

async function handleFile(ev){
  const file = ev.target.files[0];
  if(!file) return;
  document.getElementById('fileZoneLabel').textContent = 'Leyendo "' + file.name + '"...';
  document.getElementById('statusLine').textContent = '';
  const ext = file.name.split('.').pop().toLowerCase();
  try{
    if(ext === 'txt'){
      pendingFileText = await file.text();
    } else if(ext === 'pdf'){
      const buf = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({data: buf}).promise;
      let text = '';
      for(let i=1; i<=pdf.numPages; i++){
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        text += content.items.map(it => it.str).join(' ') + '\n\n';
      }
      pendingFileText = text;
    } else if(ext === 'docx'){
      const buf = await file.arrayBuffer();
      const result = await mammoth.extractRawText({arrayBuffer: buf});
      pendingFileText = result.value;
    } else {
      throw new Error('Formato no soportado');
    }
    document.getElementById('fileZoneLabel').textContent = '"' + file.name + '" listo (' + pendingFileText.length + ' caracteres)';
    if(!document.getElementById('fileTitle').value){
      document.getElementById('fileTitle').value = file.name.replace(/\.[^/.]+$/, '');
    }
  }catch(e){
    document.getElementById('statusLine').textContent = 'Error leyendo el archivo: ' + e.message;
    pendingFileText = '';
  }
}

async function saveDocument(){
  let title, text;
  if(activeTab === 'paste'){
    title = document.getElementById('pasteTitle').value.trim() || 'Sin título';
    text = document.getElementById('pasteText').value.trim();
  } else {
    title = document.getElementById('fileTitle').value.trim() || 'Sin título';
    text = pendingFileText.trim();
  }
  if(!text){
    document.getElementById('statusLine').textContent = 'Falta texto para guardar.';
    return;
  }
  const id = 'd' + Date.now();
  const chunkArr = splitChunks(text);
  const doc = {id, title, createdAt: Date.now(), chunkCount: chunkArr.length, progress: 0};
  documents.push(doc);
  try{
    await window.storage.set('documents-list', JSON.stringify(documents), false);
    await window.storage.set('doc-content:' + id, text, false);
  }catch(e){
    document.getElementById('statusLine').textContent = 'Error guardando: ' + e.message;
    return;
  }
  closeAddPanel();
  renderQueue();
}

async function deleteDoc(id){
  documents = documents.filter(d => d.id !== id);
  try{
    await window.storage.set('documents-list', JSON.stringify(documents), false);
    await window.storage.delete('doc-content:' + id, false);
    await window.storage.delete('doc-progress:' + id, false);
  }catch(e){}
  renderQueue();
}
function deleteCurrentDoc(){
  if(!currentDoc) return;
  const id = currentDoc.id;
  speechSynthesis.cancel();
  closePlayer();
  deleteDoc(id);
}

// ---------- CHUNKING ----------
function splitChunks(text){
  const raw = text.match(/[^.!?\n]+[.!?\n]*/g) || [text];
  return raw.map(s => s.trim()).filter(s => s.length > 0);
}

// ---------- PLAYER ----------
async function openDoc(id){
  const meta = documents.find(d => d.id === id);
  if(!meta) return;
  let content = '';
  try{
    const res = await window.storage.get('doc-content:' + id, false);
    content = res ? res.value : '';
  }catch(e){
    alert('No pude cargar el documento.');
    return;
  }
  let progress = 0;
  try{
    const p = await window.storage.get('doc-progress:' + id, false);
    progress = p ? parseInt(p.value, 10) || 0 : 0;
  }catch(e){ progress = 0; }

  currentDoc = meta;
  chunks = splitChunks(content);
  currentIndex = Math.min(progress, Math.max(chunks.length - 1, 0));
  isPlaying = false;

  document.getElementById('playerTitle').textContent = meta.title;
  document.getElementById('queueView').style.display = 'none';
  document.getElementById('playerView').classList.add('open');
  updateUI();
}

function closePlayer(){
  speechSynthesis.cancel();
  isPlaying = false;
  document.getElementById('playerView').classList.remove('open');
  document.getElementById('queueView').style.display = 'flex';
  renderQueue();
}

function updateUI(){
  document.getElementById('dialIcon').textContent = isPlaying ? '❚❚' : '▶';
  document.getElementById('progressReadout').textContent = (currentIndex) + ' / ' + chunks.length;
  const circumference = 615.75;
  const pct = chunks.length ? currentIndex / chunks.length : 0;
  document.getElementById('dialProgress').style.strokeDashoffset = circumference * (1 - pct);
}

async function saveProgress(idx){
  if(!currentDoc) return;
  try{
    await window.storage.set('doc-progress:' + currentDoc.id, String(idx), false);
    currentDoc.progress = idx;
    const found = documents.find(d => d.id === currentDoc.id);
    if(found) found.progress = idx;
    await window.storage.set('documents-list', JSON.stringify(documents), false);
  }catch(e){}
}

function speakChunk(i){
  if(i >= chunks.length){
    isPlaying = false;
    currentIndex = chunks.length;
    updateUI();
    return;
  }
  currentIndex = i;
  updateUI();
  const utter = new SpeechSynthesisUtterance(chunks[i]);
  if(selectedVoice) utter.voice = selectedVoice;
  utter.rate = currentRate;
  utter.lang = (selectedVoice && selectedVoice.lang) || 'es-ES';
  utter.onend = () => {
    if(manualStop){ manualStop = false; return; }
    saveProgress(i + 1);
    if(isPlaying) speakChunk(i + 1);
  };
  utter.onerror = () => {
    if(manualStop){ manualStop = false; return; }
  };
  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}

function togglePlay(){
  if(isPlaying){
    isPlaying = false;
    manualStop = true;
    speechSynthesis.cancel();
    updateUI();
  } else {
    isPlaying = true;
    speakChunk(currentIndex >= chunks.length ? 0 : currentIndex);
  }
}

function skip(delta){
  const wasPlaying = isPlaying;
  manualStop = true;
  speechSynthesis.cancel();
  currentIndex = Math.min(Math.max(currentIndex + delta, 0), chunks.length);
  saveProgress(currentIndex);
  if(wasPlaying && currentIndex < chunks.length){
    isPlaying = true;
    speakChunk(currentIndex);
  } else {
    isPlaying = false;
    updateUI();
  }
}

// ---------- VOICES ----------
function loadVoices(){
  const voices = speechSynthesis.getVoices();
  const esVoices = voices.filter(v => v.lang.toLowerCase().startsWith('es'));
  const list = esVoices.length ? esVoices : voices;
  const sel = document.getElementById('voiceSelect');
  sel.innerHTML = list.map((v, i) => `<option value="${i}">${v.name} (${v.lang})</option>`).join('');
  sel.onchange = () => { selectedVoice = list[sel.value]; if(isPlaying){ manualStop = true; speechSynthesis.cancel(); speakChunk(currentIndex);} };
  if(list.length) selectedVoice = list[0];
}

function buildRateRow(){
  const row = document.getElementById('rateRow');
  row.innerHTML = RATES.map(r => `<div class="rate-chip" data-rate="${r}" onclick="setRate(${r})">${r}×</div>`).join('');
  markActiveRate();
}
function markActiveRate(){
  document.querySelectorAll('.rate-chip').forEach(el => {
    el.classList.toggle('active', parseFloat(el.dataset.rate) === currentRate);
  });
}
function setRate(r){
  currentRate = r;
  markActiveRate();
  if(isPlaying){
    manualStop = true;
    speechSynthesis.cancel();
    speakChunk(currentIndex);
  }
}
</script>
